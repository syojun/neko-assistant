name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify secrets
        env:
          API_KEY: ${{ secrets.VITE_DIFY_API_KEY }}
          API_BASE: ${{ secrets.VITE_DIFY_API_BASE_URL }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "::error::VITE_DIFY_API_KEY が設定されていません。Settings > Secrets > Actions で追加してください。"
            exit 1
          fi
          if [ -z "$API_BASE" ]; then
            echo "::error::VITE_DIFY_API_BASE_URL が設定されていません。"
            exit 1
          fi
          echo "Secrets configured"

      - name: Build
        env:
          VITE_DIFY_API_BASE_URL: ${{ secrets.VITE_DIFY_API_BASE_URL }}
          VITE_DIFY_API_KEY: ${{ secrets.VITE_DIFY_API_KEY }}
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
