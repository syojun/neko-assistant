name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VITE_DIFY_API_BASE_URL: ${{ secrets.VITE_DIFY_API_BASE_URL }}
      VITE_DIFY_API_KEY: ${{ secrets.VITE_DIFY_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check API key
        run: |
          echo "VITE_DIFY_API_KEY length: ${#VITE_DIFY_API_KEY}"
          echo "VITE_DIFY_API_BASE_URL length: ${#VITE_DIFY_API_BASE_URL}"
          if [ -z "$VITE_DIFY_API_KEY" ]; then
            echo "::error::VITE_DIFY_API_KEY が空です。シークレット名が正確に VITE_DIFY_API_KEY か確認してください。"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
